name: tanbihulanam
description: تنبيه الأنام - صلوات على سيدنا محمد ﷺ
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_mobile_ads: ^5.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  provider: ^6.1.2
  google_fonts: ^6.2.1
  flutter_riverpod: ^2.5.1
  share_plus: 7.2.2
  package_info_plus: ^5.0.1
  # Add web support
  flutter_web_plugins:
    sdk: flutter
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  adhan: ^2.0.0
  #flutter_local_notifications: ^16.3.0
  #timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1 

flutter:
  uses-material-design: true
  assets:
    - assets/json/tanbih_clean.json
    - assets/images/landscape.png
  fonts:
    - family: NotoArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#0A5C36"
  adaptive_icon_foreground: "assets/images/icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/icon.png"
    background_color: "#0A5C36"
    theme_color: "#0A5C36"
  windows:
    generate: true
    image_path: "assets/images/icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/icon.png"