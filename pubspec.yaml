name: tanbihulanam
description: تنبيه الأنام - صلوات على سيدنا محمد ﷺ
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_mobile_ads: ^5.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  provider: ^6.1.2
  google_fonts: ^6.2.1
  flutter_riverpod: ^2.5.1
  share_plus: 7.2.2
  package_info_plus: ^5.0.1
  # Add web support
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/json/tanbih_clean.json
    - assets/images/landscape.png
  fonts:
    - family: NotoArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf